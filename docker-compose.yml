services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
